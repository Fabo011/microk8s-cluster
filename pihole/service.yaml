apiVersion: v1
kind: Service
metadata:
  name: pihole-web-service
spec:
  selector:
    app: pihole
  type: LoadBalancer
  ports:
    - name: pihole-http
      protocol: TCP
      port: 80            # internal cluster port
      targetPort: 80      # container port
---
apiVersion: v1
kind: Service
metadata:
  name: pihole-dns-service
spec:
  selector:
    app: pihole
  type: LoadBalancer
  ports:
    - name: dns-tcp
      protocol: TCP
      port: 53
      targetPort: 53
    - name: dns-udp
      protocol: UDP
      port: 53
      targetPort: 53
