#sudo mkdir -p /mnt/ssd/vw-data /mnt/ssd/mealie-data /mnt/ssd/linky-data
#sudo chown -R 1000:1000 /mnt/ssd/vw-data /mnt/ssd/mealie-data /mnt/ssd/linky-data


services:

  watchtower:
    image: ghcr.io/nicholas-fedor/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8090:8080"
    environment:
      WATCHTOWER_POLL_INTERVAL: 86400  # 86400 = 24h
      WATCHTOWER_CLEANUP: "true"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}

  linky:
    container_name: linkycloud
    image: ghcr.io/fabo011/linky:4.0.19
    platform: linux/arm64
    ports:
      - "8082:80"
    environment:
      - VUE_APP_SUPABASE_URL=${VUE_APP_SUPABASE_URL}
      - VUE_APP_API_KEY=${VUE_APP_API_KEY}
    restart: unless-stopped
    depends_on:
      - cloudflared
    volumes:
      - /mnt/ssd/linky-data:/app/data

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
       DOMAIN: "https://vw.fabo011-cloud.de"
    volumes:
        - /mnt/ssd/vw-data:/data
    ports:
        - "8000:80"

  mealie:
    image: ghcr.io/mealie-recipes/mealie:latest
    container_name: mealie
    restart: always
    ports:
      - "9925:9000"
    volumes:
      - /mnt/ssd/mealie-data:/app/data
    environment:
      - ALLOW_SIGNUP=true
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin

  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    ports:
      - "${SERVER_IP}:53:53/tcp"
      - "${SERVER_IP}:53:53/udp"
      - "${SERVER_IP}:8081:80/tcp"
      #- "${SERVER_IP}:443:443/tcp"
    environment:
      TZ: 'Europe/Berlin'
      FTLCONF_webserver_api_password: ${PIHOLE_API_PASSWORD}
      FTLCONF_dns_listeningMode: 'ALL'
    volumes:
      - '/mnt/ssd/pihole:/etc/pihole'
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
    restart: unless-stopped

  databag:
    image: balzack/databag:latest
    container_name: databag
    restart: unless-stopped
    ports:
      - "7000:7000"
    volumes:
      - /mnt/ssd/chat:/var/lib/databag

  shooter-app:
    image: ghcr.io/fabo011/shooter-app:latest
    container_name: shooter-app
    restart: unless-stopped
    ports:
      - "8083:80"

  fabo011-landingpage:
    image: ghcr.io/fabo011/fabo011-landing:latest
    container_name: fabo011-landingpage
    restart: unless-stopped
    ports:
      - "8085:80"

